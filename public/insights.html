<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');if(!t&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)t='dark';if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker — Insights</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <span class="nav-brand">Job Tracker — Insights</span>
  <div class="nav-right">
    <a class="btn-ghost" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center;">&larr; Dashboard</a>
    <a class="btn-ghost" href="kanban.html" style="text-decoration:none;display:inline-flex;align-items:center;">Kanban</a>
    <button class="btn-ghost" id="btn-logout">Sign out</button>
  </div>
</nav>

<main class="main-wrap">
  <!-- Search -->
  <div class="search-row">
    <input type="text" id="search-input" placeholder="Search company or title&hellip;">
  </div>

  <!-- Filters (collapsible) -->
  <div class="filters-toggle-row">
    <button class="btn-ghost" id="btn-filters-toggle">Filters &#9662;</button>
  </div>
  <div class="filters-panel" id="filters-panel" hidden>
    <div class="filter-row" id="filter-row"></div>
    <div class="date-filter-row">
      <label for="date-preset">Applied</label>
      <select id="date-preset">
        <option value="all">All time</option>
        <option value="today">Today</option>
        <option value="this-week">This week</option>
        <option value="last-week">Last week</option>
        <option value="this-month">This month</option>
        <option value="last-month">Last month</option>
        <option value="this-year">This year</option>
        <option value="custom">Custom range&hellip;</option>
      </select>
      <div id="custom-date-range" class="date-range-inputs" hidden>
        <input type="date" id="date-from">
        <span>to</span>
        <input type="date" id="date-to">
      </div>
    </div>
  </div>

  <p id="filter-summary" style="font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;"></p>

  <div class="stats-row" id="stats-row"></div>

  <section class="chart-section">
    <div class="chart-header">
      <h2 class="chart-title">Applications over time</h2>
      <div class="filter-row" id="granularity-row" style="margin:0;">
        <button class="filter-btn" data-granularity="day">Day</button>
        <button class="filter-btn" data-granularity="week">Week</button>
        <button class="filter-btn" data-granularity="month">Month</button>
      </div>
    </div>
    <div id="daily-chart" class="chart-container"></div>
  </section>

  <section class="chart-section">
    <h2 class="chart-title">Application pipeline</h2>
    <div id="funnel-chart" class="chart-container"></div>
  </section>

  <section class="chart-section">
    <h2 class="chart-title">Breakdown</h2>
    <div id="donut-chart" class="chart-container"></div>
    <div class="filter-row" id="donut-dimension-row" style="margin-top:1rem;margin-bottom:0;">
      <button class="filter-btn active" data-dim="stage">Stage</button>
      <button class="filter-btn" data-dim="fit">Fit</button>
      <button class="filter-btn" data-dim="location_type">Location type</button>
      <button class="filter-btn" data-dim="location">Location</button>
      <button class="filter-btn" data-dim="outcome">Outcome</button>
    </div>
  </section>

  <section class="chart-section">
    <h2 class="chart-title">Referral &amp; recruiter contact impact</h2>
    <p class="chart-note">Does a warm intro actually move the needle? Compares how far applications get based on whether they had a referral or inbound recruiter contact.</p>
    <div id="referral-chart" class="chart-container"></div>
  </section>
</main>

<script src="filters.js"></script>
<script src="insights.js"></script>
</body>
</html>
